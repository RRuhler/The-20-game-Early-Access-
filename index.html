<style>.body {
  background: #fff;

}
.gm {

}
.gmn {

  animation-iteration-count: infinite;
}
.marker {
  transform: translateY(-149px) translateX(90px) scale(1500%);
  visibility: hidden;
}

.mo {
  transform: translateY(-400px) translateX(420px);
  visibility: hidden;
}

.hidennn {

}
.h {

  visibility: hidden;
}
.number {
  cursor: pointer;
}
.nick {
  transform: translateY(-36px) translateX(240px);
  opacity: 0.0;
}
.cli {
  transform: translateX(80px) translateY(-50px);
  visibility: hidden;
}
.clie {
  transform: translateX(590px) translateY(-30px) scale(160%);
  visibility: hidden;
}
.button:hover {
  cursor: pointer;
}
.button {
  opacity: 0.0;
  animation-name: rainbow;
  animation-duration: 2s;
  animation-iteration-count: infinite;
}
.hid {
  transform: translateX(440px);
  opacity: 0.0;
}
.button {
  opacity: 0.0;

}
.gam {

}
.lev:active ~ .button {
  opacity: 1.0;

}

.wt {

}

@keyframes rainbow {
  0%{color: red;}
  20%{color: orange;}
  40%{color: yellow;}
  60%{color: green;}
  80%{color: blue;}
  100%{color: purple;}
}

@keyframes rainbowe {
  0%{background-color: red;}
  20%{background-color: orange;}
  40%{background-color: yellow;}
  60%{background-color: green;}
  80%{background-color: blue;}
  100%{background-color: purple;}
}

@keyframes yellowgreen {
  0%{color: yellow;}
  50%{color: green;}
  100%{color: blue;}
}
@keyframes glowrainbow {
  0%{box-shadow: 0px 0px 75px red;}
  20%{box-shadow: 0px 0px 75px orange;}
  40%{box-shadow: 0px 0px 75px yellow;}
  60%{box-shadow: 0px 0px 75px green;}
  80%{box-shadow: 0px 0px 75px blue;}
  100%{box-shadow: 0px 0px 75px purple;}
}

@keyframes fadered {
  0%{color: black;}
  100%{color: red;}
}

@keyframes fadeyellow {
  0%{color: black;}
  100%{color: yellow;}
}
@keyframes redglow {
  0%{box-shadow: 0px 0px 55px  yellow;}
  100%{box-shadow: 0px 0px 55px red;}
}

@keyframes replace {
  0%{color: black; background-color: black}
  100%{color: black; background-color: black;}
}

@keyframes norm {
  0% {color: black;}
  100% {color: black;}
}

@keyframes white {
  0% {color: white;}
  100% {color: white;}
}

@keyframes whitee {
  0% {background-color: white;}
  100% {background-color: white;}
}


</style>
